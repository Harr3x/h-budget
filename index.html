<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1a1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<title>Budget</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="reminder-banner" class="banner hidden">
  <span>💡 Neuer Monat — denk an Investments &amp; Notgroschen</span>
  <button id="reminder-dismiss">Verstanden</button>
</div>

<header id="topbar">
  <button id="settings-btn" class="icon-btn-top" data-tab="settings" aria-label="Einstellungen"><i class="ico ico-setting"></i></button>
</header>

<main id="view"></main>

<nav id="tabbar">
  <button class="tab" data-tab="entry"><i class="ico ico-plus"></i><span>Neu</span></button>
  <button class="tab" data-tab="overview"><i class="ico ico-pie"></i><span>Budget</span></button>
  <button class="tab" data-tab="history"><i class="ico ico-list"></i><span>Liste</span></button>
  <button class="tab" data-tab="recurring"><i class="ico ico-refresh"></i><span>Fix</span></button>
</nav>

<div id="toast" class="toast hidden"></div>

<script src="app.js"></script>
</body>
</html>
